name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '18'
  # Safe test-only secrets – override via repository secrets for real deployments
  JWT_SECRET: 'ci-test-jwt-secret-not-for-prod!!'
  AES_KEY: '12345678901234567890123456789012'
  KEYSTONE: 'repo/keystone'

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ── 1. Backend unit + integration tests ───────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: keystone_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.KEYSTONE }}/backend/go.sum

      - name: Apply DB schema
        run: psql -h localhost -U postgres -d keystone_test -f ${{ env.KEYSTONE }}/db/init.sql
        env:
          PGPASSWORD: postgres

      - name: go vet
        working-directory: ${{ env.KEYSTONE }}/backend
        run: go vet ./...

      - name: Run tests
        working-directory: ${{ env.KEYSTONE }}/backend
        run: |
          go test ./... \
            -v \
            -cover \
            -coverprofile=coverage.out \
            -timeout 120s \
            2>&1 | tee test-output.txt
          echo "--- coverage summary ---"
          go tool cover -func=coverage.out | tail -5
        env:
          JWT_SECRET: ${{ env.JWT_SECRET }}
          AES_KEY: ${{ env.AES_KEY }}
          TEST_DB_DSN: 'postgres://postgres:postgres@localhost:5432/keystone_test?sslmode=disable'

      - name: Coverage gate (≥ 45%)
        working-directory: ${{ env.KEYSTONE }}/backend
        run: |
          PCT=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${PCT}%"
          awk -v p="$PCT" 'BEGIN {
            if (p+0 < 45) { print "FAIL: coverage " p "% is below the 45% threshold"; exit 1 }
            print "PASS: coverage " p "% meets threshold"
          }'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.KEYSTONE }}/backend/coverage.out
          retention-days: 14

  # ── 2. Frontend component tests ───────────────────────────────────────────
  frontend-tests:
    name: Frontend Component Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.KEYSTONE }}/frontend
        run: npm install

      - name: Run component tests
        working-directory: ${{ env.KEYSTONE }}/frontend
        run: CI=true npm test -- --watchAll=false --coverage --coverageReporters=text --coverageReporters=json-summary
        env:
          CI: 'true'

      - name: Report frontend coverage
        working-directory: ${{ env.KEYSTONE }}/frontend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -e "const s=require('./coverage/coverage-summary.json');const p=s.total.lines.pct;console.log(typeof p==='number'?p:0)")
            echo "Line coverage: ${PCT}%"
          else
            echo "No coverage summary found"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ${{ env.KEYSTONE }}/frontend/coverage/
          retention-days: 14

  # ── 3. Frontend build smoke-test ──────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.KEYSTONE }}/frontend
        run: npm install

      - name: Build production bundle
        working-directory: ${{ env.KEYSTONE }}/frontend
        run: npm run build
        env:
          CI: 'false'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.KEYSTONE }}/frontend/build/
          retention-days: 7

  # ── 4. E2E tests (full Docker Compose stack + Playwright) ─────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        working-directory: ${{ env.KEYSTONE }}
        run: |
          cat > .env <<'EOF'
          JWT_SECRET=ci-test-jwt-secret-not-for-prod!!
          AES_KEY=12345678901234567890123456789012
          EOF

      - name: Build Docker images
        working-directory: ${{ env.KEYSTONE }}
        run: docker compose build

      - name: Start services
        working-directory: ${{ env.KEYSTONE }}
        run: docker compose up -d db backend frontend

      - name: Wait for backend health
        run: |
          echo "Waiting for backend..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:8080/api/health > /dev/null; do sleep 2; done'
          echo "Backend ready"

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Frontend ready"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        working-directory: ${{ env.KEYSTONE }}/tests/e2e
        run: |
          npm install 2>/dev/null || npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: ${{ env.KEYSTONE }}/tests/e2e
        run: npx playwright test --config=playwright.config.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.KEYSTONE }}/tests/e2e/playwright-report/
          retention-days: 14

      - name: Print service logs on failure
        if: failure()
        working-directory: ${{ env.KEYSTONE }}
        run: |
          echo "=== backend logs ==="
          docker compose logs backend | tail -50
          echo "=== db logs ==="
          docker compose logs db | tail -20

      - name: Tear down
        if: always()
        working-directory: ${{ env.KEYSTONE }}
        run: docker compose down -v
